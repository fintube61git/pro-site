<body class="page-resume">
  <main id="main" class="section">
    <div class="container">
      <nav class="resume-actions" aria-label="Resume actions">
        <a href="/cv/">View full CV</a>
        <button type="button" onclick="window.print()">Print resume</button>
      </nav>
      <article id="resume-content" aria-live="polite">Loading resume...</article>
    </div>
  </main>

  <script src="../js/markdown.js"></script>
  <script>
    (async function () {
      const root = document.getElementById("resume-content");
      try {
        const response = await fetch("/resume.md", { cache: "no-store" });
        if (!response.ok) throw new Error("Could not load resume source.");
        root.innerHTML = window.TdwMarkdown.render(await response.text());
      } catch (err) {
        root.textContent = "Could not load resume.";
        console.error(err);
      }
    })();
  </script>
